<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Medical Fabrica — Sign in to your account.">
  <title>Medical Fabrica — Login</title>

  <!-- Styles -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/utilities.css">
  <link rel="stylesheet" href="login.css">
</head>
<body class="login-page">

  <!-- HEADER — minimal nav for login -->
  <header class="site-header" role="banner">
    <div class="site-header__bar">
      <a href="../" class="site-header__logo" aria-label="Medical Fabrica home">
        <img src="../assets/images/logo_default.avif" alt="Medical Fabrica" class="site-header__logo-default">
        <img src="../assets/images/logo.avif" alt="Medical Fabrica" class="site-header__logo-scrolled">
      </a>

      <nav class="site-nav site-nav--minimal" role="navigation" aria-label="Main navigation">
        <a href="../" class="site-nav__link">Home</a>
        <a href="../contact/" class="site-nav__link">Help</a>
      </nav>
    </div>
  </header>

  <main id="main-content" class="login-main">

    <!-- Centered Card Layout -->
    <section class="login-section" aria-labelledby="login-heading">
      <div class="login-card rounded-xl" data-reveal="scale">

        <header class="login-card__header">
          <h1 id="login-heading" class="login-card__title">Welcome Back</h1>
          <p class="body-sm text-muted mt-1">Sign in to your Medical Fabrica account.</p>
        </header>

        <form class="login-form mt-4" action="#" method="POST" novalidate>
          <div class="form-group">
            <label for="login-email" class="form-label">Email</label>
            <input
              type="email"
              id="login-email"
              name="email"
              class="form-input"
              placeholder="you@example.com"
              required
              autocomplete="email"
            >
          </div>

          <div class="form-group">
            <label for="login-password" class="form-label">Password</label>
            <input
              type="password"
              id="login-password"
              name="password"
              class="form-input"
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            >
          </div>

          <div class="login-form__options">
            <label class="login-form__remember">
              <input type="checkbox" name="remember" class="login-form__checkbox">
              <span class="body-sm">Remember me</span>
            </label>
            <a href="#" class="login-form__forgot body-sm">Forgot password?</a>
          </div>

          <button type="submit" class="button-primary button-lg login-form__submit">Sign In</button>
        </form>

        <div class="login-card__divider mt-4 mb-4" role="separator">
          <span class="caption text-muted">or</span>
        </div>

        <div class="login-card__alt">
          <button type="button" class="button-outline login-form__submit">Continue with Google</button>
        </div>

        <footer class="login-card__footer mt-4">
          <p class="body-sm text-muted">
            Don't have an account?
            <a href="#" class="login-card__signup-link">Sign up</a>
          </p>
        </footer>

      </div>
    </section>

  </main>

  <!-- Scripts — login is lightweight: Lenis + main only -->
  <script src="https://unpkg.com/lenis@1/dist/lenis.min.js" defer></script>
  <script src="../js/main.js" defer></script>
  <script src="login.js" defer></script>
</body>
</html>
